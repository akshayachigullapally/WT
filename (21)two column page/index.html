    <!-- Right Side Form -->
    <div class="right">
        <h2>Signup Form</h2>

        <form onsubmit="return validateForm()">
            <input type="text" id="name" placeholder="Enter Name"><br>

            <input type="text" id="email" placeholder="Enter Email" onkeyup="checkEmail()">
            <br>
            <span id="emailMsg"></span><br>

            <input type="password" id="password" placeholder="Enter Password" onkeyup="checkPassword()">
            <br>
            <span id="passMsg"></span><br>

            <input type="password" id="confirm" placeholder="Confirm Password" onkeyup="checkConfirm()">
            <br>
            <span id="confirmMsg"></span><br>

            <input type="text" id="phone" placeholder="Enter Phone Number" onkeyup="checkPhone()">
            <br>
            <span id="phoneMsg"></span><br><br>

            <button type="submit">Sign Up</button>
        </form>
    </div>

</div>

<script>
    function checkEmail(){
        let email = document.getElementById("email").value;
        let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if(pattern.test(email)){
            document.getElementById("emailMsg").innerHTML="Valid Email";
        }
        else{
            document.getElementById("emailMsg").innerHTML="Invalid Email";
        }
    }

    function checkPassword(){
        let pass = document.getElementById("password").value;

        if(pass.length < 6){
            document.getElementById("passMsg").innerHTML="Weak Password";
        }
        else{
            document.getElementById("passMsg").innerHTML="Strong Password";
        }
    }

    function checkConfirm(){
        let pass = document.getElementById("password").value;
        let confirm = document.getElementById("confirm").value;

        if(pass == confirm){
            document.getElementById("confirmMsg").innerHTML="Passwords Match";
        }
        else{
            document.getElementById("confirmMsg").innerHTML="Passwords do not match";
        }
    }

    function checkPhone(){
        let phone = document.getElementById("phone").value;

        if(phone.length == 10 && !isNaN(phone)){
            document.getElementById("phoneMsg").innerHTML="Valid Phone Number";
        }
        else{
            document.getElementById("phoneMsg").innerHTML="Phone must be 10 digits";
        }
    }
