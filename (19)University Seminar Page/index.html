<!DOCTYPE html>
<html>
<head>
    <title>University Seminar</title>
    <style>
        body{
            font-family:Arial;
            margin:0;
            text-align:center;
            background:#f4f4f4;
        }

        .banner{
            background:blue;
            color:white;
            padding:20px;
        }

        .speakers{
            display:flex;
            justify-content:center;
            gap:20px;
            margin:20px;
        }

        .card{
            background:white;
            width:200px;
            padding:20px;
            border:1px solid gray;
            cursor:pointer;
        }

        .card:hover{
            transform:scale(1.05);
            background:lightblue;
        }

        table{
            margin:auto;
            border-collapse:collapse;
            width:60%;
            background:white;
        }

        table,th,td{
            border:1px solid black;
            padding:10px;
        }

        button{
            margin:20px;
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
        }

        /* Modal */
        .modal{
            display:none;
            position:fixed;
            top:20%;
            left:35%;
            width:300px;
            background:white;
            padding:20px;
            border:2px solid black;
        }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="banner">
        <h1>University Seminar 2026</h1>
        <p>Learn from Industry Experts</p>
    </div>

    <!-- Speaker Cards -->
    <h2>Speakers</h2>
    <div class="speakers">
        <div class="card" onclick="showDetails('Dr. Ravi - AI Expert')">
            <h3>Dr. Ravi</h3>
            <p>Artificial Intelligence</p>
        </div>

        <div class="card" onclick="showDetails('Ms. Priya - Cyber Security Expert')">
            <h3>Ms. Priya</h3>
            <p>Cyber Security</p>
        </div>

        <div class="card" onclick="showDetails('Mr. Arjun - Web Developer')">
            <h3>Mr. Arjun</h3>
            <p>Web Development</p>
        </div>
    </div>

    <!-- Schedule Table -->
    <h2>Schedule</h2>
    <table>
        <tr>
            <th>Time</th>
            <th>Topic</th>
        </tr>
        <tr>
            <td>10 AM</td>
            <td>AI Trends</td>
        </tr>
        <tr>
            <td>12 PM</td>
            <td>Cyber Security</td>
        </tr>
        <tr>
            <td>2 PM</td>
            <td>Web Development</td>
        </tr>
    </table>

    <!-- Registration Button -->
    <button onclick="register()">Register Now</button>

    <!-- Modal -->
    <div class="modal" id="modal">
        <h3>Speaker Details</h3>
        <p id="details"></p>
        <button onclick="closeModal()">Close</button>
    </div>

    <script>
        function showDetails(info){
            document.getElementById("details").innerHTML = info;
            document.getElementById("modal").style.display = "block";
        }

        function closeModal(){
            document.getElementById("modal").style.display = "none";
        }

        function register(){
            alert("Registration Successful!");
        }
    </script>

</body>
</html>
